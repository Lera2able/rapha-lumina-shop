name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/workers/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Verify Cloudflare auth
        id: cf-auth
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          quiet: "false"
          command: whoami

      - name: Print auth output
        run: |
          echo "${{ steps.cf-auth.outputs.command-output }}"
          echo "${{ steps.cf-auth.outputs.command-stderr }}"

      - name: Deploy Worker to Cloudflare
        id: deploy-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          quiet: "false"
          command: deploy

      - name: Print deploy output
        if: always()
        run: |
          echo "${{ steps.deploy-worker.outputs.command-output }}"
          echo "${{ steps.deploy-worker.outputs.command-stderr }}"
